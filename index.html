<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PBBET: Next-Gen iGaming Ecosystem</title>
  <meta name="description" content="PBBET: Next-Gen iGaming Ecosystem project status page." />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #111827;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 720px;
      text-align: center;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 48px 28px;
      background: #ffffff;
    }

    .status {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      font-size: 13px;
      color: #374151;
      background: #f9fafb;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      font-size: 18px;
      line-height: 1.6;
      color: #4b5563;
    }

    .note {
      margin-top: 22px;
      font-size: 15px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main>
    <div class="status">Project Status</div>
    <h1>PBBET: Next-Gen iGaming Ecosystem</h1>
    <p>This project has not been approved yet. Development will start after approval.</p>
    <p class="note">Further updates will be shared here after the project is approved.</p>
  </main>
</body>
</html>
